apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

images:
  - name: payments-api
    newName: ECR_IMAGE
    newTag: latest

resources:
  - ../../base
  - ingress.yaml

configMapGenerator:
  - name: payments-api-config
    envs:
      - .env.host
    options:
      disableNameSuffixHash: true

secretGenerator:
  - name: payments-api-secrets
    envs:
      - .env.secrets
    options:
      disableNameSuffixHash: true

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
    target:
      kind: Deployment
      name: payments-api