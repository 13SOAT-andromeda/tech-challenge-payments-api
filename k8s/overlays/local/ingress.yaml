apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payments-api-ingress
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /webhooks/mercadopago
            pathType: Prefix
            backend:
              service:
                name: payments-api-svc
                port:
                  number: 80
