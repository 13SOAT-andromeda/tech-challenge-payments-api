apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:4
          ports:
            - containerPort: 4566
          env:
            - name: SERVICES
              value: sqs,sns,apigateway
            - name: DEFAULT_REGION
              value: us-east-1
            - name: SQS_ENDPOINT_STRATEGY
              value: "off"
            - name: LOCALSTACK_HOST
              value: "localstack:4566"
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
spec:
  selector:
    app: localstack
  ports:
    - port: 4566
      targetPort: 4566
---
apiVersion: batch/v1
kind: Job
metadata:
  name: localstack-init
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-localstack
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              until curl -sf http://localstack:4566/_localstack/health | grep -qE '"sqs": "(available|running)"'; do
                echo "Aguardando LocalStack..."; sleep 2
              done
      containers:
        - name: init
          image: amazon/aws-cli
          env:
            - name: AWS_ACCESS_KEY_ID
              value: test
            - name: AWS_SECRET_ACCESS_KEY
              value: test
            - name: AWS_DEFAULT_REGION
              value: us-east-1
          command:
            - sh
            - -c
            - |
              aws --endpoint-url=http://localstack:4566 sqs create-queue \
                --queue-name payment-order-events-queue
              aws --endpoint-url=http://localstack:4566 sns create-topic \
                --name payment-events
              echo "LocalStack inicializado."
