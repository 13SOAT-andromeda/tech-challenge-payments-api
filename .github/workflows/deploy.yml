name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Infrastructure Pre-check
  # Validates that required AWS resources are provisioned before any build or
  # deploy step executes. Runs in parallel with the build job.
  # ─────────────────────────────────────────────────────────────────────────────
  infra-check:
    name: Infrastructure Pre-check
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check ECR repository exists
        run: |
          echo "Checking ECR repository: ${{ vars.AWS_PAYMENT_ECR_REPOSITORY }}"
          if ! aws ecr describe-repositories \
              --repository-names "${{ vars.AWS_PAYMENT_ECR_REPOSITORY }}" \
              --region "${{ secrets.AWS_REGION }}" > /dev/null 2>&1; then
            echo "::error::ECR repository '${{ vars.AWS_PAYMENT_ECR_REPOSITORY }}' does not exist in region ${{ secrets.AWS_REGION }}."
            echo "::error::Create it manually or add an ECR resource to infra/modules/ and run apply-terraform.sh."
            exit 1
          fi
          echo "ECR repository exists."

      - name: Check RDS instance is available
        run: |
          echo "Checking RDS instance: ${{ vars.AWS_RDS_PAYMENT_NAME }}"
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier "${{ vars.AWS_RDS_PAYMENT_NAME }}" \
            --query 'DBInstances[0].DBInstanceStatus' \
            --output text 2>/dev/null || echo "NOT_FOUND")
          echo "RDS status: $STATUS"
          if [ "$STATUS" != "available" ]; then
            echo "::error::RDS instance '${{ vars.AWS_RDS_PAYMENT_NAME }}' is not available (current status: $STATUS)."
            echo "::error::Run infra/apply-terraform.sh to provision the database, or wait for it to finish modifying."
            exit 1
          fi
          echo "RDS instance is available."

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build and push Docker image to ECR
  # Runs in parallel with infra-check. The deploy job waits for both.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ vars.AWS_PAYMENT_ECR_REPOSITORY }}:latest \
            .

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ vars.AWS_PAYMENT_ECR_REPOSITORY }}:latest

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to EKS
  # Depends on both infra-check and build succeeding.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [infra-check, build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name "${{ vars.AWS_EKS_CLUSTER_NAME }}" \
            --region "${{ secrets.AWS_REGION }}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set ECR image in kustomize overlay
        run: |
          ECR_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ vars.AWS_PAYMENT_ECR_REPOSITORY }}"
          sed -i "s|ECR_IMAGE|${ECR_IMAGE}|g" k8s/overlays/aws/kustomization.yaml

      - name: Get RDS endpoint
        id: rds
        run: |
          DB_ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier "${{ vars.AWS_RDS_PAYMENT_NAME }}" \
            --query 'DBInstances[0].Endpoint.Address' \
            --output text)
          echo "endpoint=${DB_ENDPOINT}" >> $GITHUB_OUTPUT

      - name: Get SQS and SNS endpoints
        id: aws-resources
        run: |
          SQS_URL=$(aws sqs get-queue-url \
            --queue-name "${{ vars.SQS_PAYMENT_QUEUE_NAME }}" \
            --query QueueUrl --output text)
          SNS_ARN=$(aws sns list-topics \
            --query "Topics[?contains(TopicArn,'${{ vars.SNS_PAYMENT_TOPIC_NAME }}')].TopicArn | [0]" \
            --output text)
          echo "sqs_url=${SQS_URL}" >> $GITHUB_OUTPUT
          echo "sns_arn=${SNS_ARN}" >> $GITHUB_OUTPUT

      - name: Generate .env.host
        run: |
          printf 'DB_HOST=%s\nDB_USER=payments\nDATABASE_URL=postgres://payments:%s@%s:5432/payments?sslmode=require\nSQS_QUEUE_URL_ORDER_EVENTS=%s\nSNS_TOPIC_ARN_PAYMENT=%s\nAWS_REGION=%s\nPORT=8080\n' \
            "${{ steps.rds.outputs.endpoint }}" \
            "${{ secrets.AWS_RDS_DB_PASSWORD }}" \
            "${{ steps.rds.outputs.endpoint }}" \
            "${{ steps.aws-resources.outputs.sqs_url }}" \
            "${{ steps.aws-resources.outputs.sns_arn }}" \
            "${{ secrets.AWS_REGION }}" \
            > k8s/overlays/aws/.env.host

      - name: Generate .env.secrets
        run: |
          printf 'MERCADOPAGO_ACCESS_TOKEN=%s\nMERCADOPAGO_WEBHOOK_SECRET=%s\nMERCADOPAGO_PUBLIC_KEY=%s\nDB_PASSWORD=%s\nAWS_ACCESS_KEY_ID=%s\nAWS_SECRET_ACCESS_KEY=%s\n' \
            "${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}" \
            "${{ secrets.MERCADOPAGO_WEBHOOK_SECRET }}" \
            "${{ secrets.MERCADOPAGO_PUBLIC_KEY }}" \
            "${{ secrets.AWS_RDS_DB_PASSWORD }}" \
            "${{ secrets.AWS_ACCESS_KEY_ID }}" \
            "${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            > k8s/overlays/aws/.env.secrets

      - name: Apply kustomize overlay to EKS
        run: kubectl apply -k k8s/overlays/aws/

      - name: Verify deployment rollout
        run: kubectl rollout status deployment/payments-api --timeout=120s