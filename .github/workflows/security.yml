name: Security Scan

on:
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
      - 'feature/**'

jobs:
  security-sast:
    name: SAST & Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Go project
        run: go build ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec SAST scan
        run: gosec -fmt sarif -out gosec-report.sarif ./...
        continue-on-error: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck vulnerability scan
        run: govulncheck -json ./... > vulncheck-report.json
        continue-on-error: true

      - name: Upload gosec SARIF report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-report
          path: gosec-report.sarif

      - name: Upload govulncheck report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulncheck-report
          path: vulncheck-report.json
